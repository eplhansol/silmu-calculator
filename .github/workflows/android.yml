name: Build Android (Play Store AAB)

# 수동 실행 버튼 + main 브랜치 push 시 실행
on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: Node 설치
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 프론트엔드 의존성 설치
        run: npm install

      - name: Rust + 안드로이드 타겟 설치
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,i686-linux-android,x86_64-linux-android

      - name: Java(JDK 17) 설치
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: 안드로이드 SDK 설정
        uses: android-actions/setup-android@v3

      - name: NDK 설치
        run: sdkmanager "ndk;26.1.10909125"

      - name: 서명 키 복원 (비밀값 → 파일)
        run: echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 -d > "$RUNNER_TEMP/upload.jks"

      - name: keystore.properties 생성
        run: |
          cat > src-tauri/gen/android/keystore.properties <<EOF
          password=${{ secrets.ANDROID_KEY_PASSWORD }}
          keyAlias=${{ secrets.ANDROID_KEY_ALIAS }}
          storeFile=$RUNNER_TEMP/upload.jks
          EOF

      - name: AAB + APK 빌드
        env:
          NDK_HOME: ${{ env.ANDROID_HOME }}/ndk/26.1.10909125
        run: npm run tauri -- android build --aab --apk

      - name: AAB 업로드 (플레이스토어용)
        uses: actions/upload-artifact@v4
        with:
          name: playstore-aab
          path: src-tauri/gen/android/app/build/outputs/bundle/**/*.aab

      - name: APK 업로드 (폰 테스트용)
        uses: actions/upload-artifact@v4
        with:
          name: test-apk
          path: src-tauri/gen/android/app/build/outputs/apk/**/*.apk
